name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check
        run: |
          python -m py_compile server.py
          python -m py_compile core/llm.py
          python -m py_compile core/whatsapp.py
          python -m py_compile core/database.py
          python -m py_compile agents/recepcionista.py
          python -m py_compile agents/confirmador.py
          python -m py_compile agents/resgate.py
          python -m py_compile agents/avaliacao.py
          python -m py_compile agents/painel.py
          echo "Todos os modulos passaram na verificacao de sintaxe"

      - name: Import check
        run: |
          python -c "
          import sys, importlib.util, pathlib
          errors = []
          for f in pathlib.Path('.').rglob('*.py'):
              spec = importlib.util.spec_from_file_location('mod', f)
              try:
                  mod = importlib.util.module_from_spec(spec)
                  spec.loader.exec_module(mod)
              except ImportError:
                  pass  # dependencias externas nao instaladas no CI sao esperadas
              except SyntaxError as e:
                  errors.append(f'{f}: {e}')
          if errors:
              print('ERROS:', errors)
              sys.exit(1)
          print('Import check OK')
          "
